name: Vertix

targets:
  Vertix:
    type: application
    platform: iOS
    deploymentTarget: "18.6"

    sources:
      - path: Vertix

    configFiles:
      Debug: Pods/Target Support Files/Pods-Vertix/Pods-Vertix.debug.xcconfig
      Release: Pods/Target Support Files/Pods-Vertix/Pods-Vertix.release.xcconfig

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.felix.Vertix
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"
        SWIFT_APPROACHABLE_CONCURRENCY: "YES"
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        INFOPLIST_KEY_NSCameraUsageDescription: "Vertix needs camera access to monitor your posture during study sessions."
        ENABLE_PREVIEWS: "YES"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        IPHONEOS_DEPLOYMENT_TARGET: "18.6"

  VertixTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.6"

    sources:
      - path: VertixTests

    configFiles:
      Debug: Pods/Target Support Files/Pods-VertixTests/Pods-VertixTests.debug.xcconfig
      Release: Pods/Target Support Files/Pods-VertixTests/Pods-VertixTests.release.xcconfig

    dependencies:
      - target: Vertix

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.felix.VertixTests
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: "YES"
        SWIFT_APPROACHABLE_CONCURRENCY: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Vertix.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Vertix"
        BUNDLE_LOADER: "$(TEST_HOST)"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@loader_path/Frameworks"
        IPHONEOS_DEPLOYMENT_TARGET: "18.6"
        OTHER_LDFLAGS: "$(inherited)"
